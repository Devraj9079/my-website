<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperStudio | Luxury Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --accent: #0071e3;
            --bg: #ffffff;
            --card-bg: #f5f5f7;
            --text-main: #1d1d1f;
            --border: #d2d2d7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text-main); }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8%; height: 60px; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .logo span { color: var(--accent); }
        
        /* Search Bar */
        .search-container { flex: 0.6; position: relative; display: flex; align-items: center; }
        .search-container input {
            width: 100%; padding: 8px 15px 8px 35px; border-radius: 8px;
            border: 1px solid var(--border); background: #fbfbfd; outline: none; font-size: 0.85rem;
        }
        .search-container i { position: absolute; left: 12px; color: #86868b; font-size: 0.8rem; }

        .nav-right { display: flex; gap: 20px; align-items: center; font-size: 0.9rem; }
        .cart-trigger { cursor: pointer; position: relative; font-size: 1.1rem; }
        #cart-count { position: absolute; top: -8px; right: -10px; background: var(--accent); color: white; font-size: 0.65rem; padding: 1px 5px; border-radius: 50%; }

        /* --- HERO --- */
        .hero {
            height: 30vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600&q=80');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        /* --- PRODUCT GRID --- */
        .container { padding: 40px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; }
        
        .product-card { background: #fff; border-radius: 20px; padding: 20px; transition: 0.4s ease; text-align: center; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .img-box { width: 100%; height: 260px; background: var(--card-bg); border-radius: 15px; overflow: hidden; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }

        .product-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 5px; height: 42px; overflow: hidden; }
        .price { font-size: 14px; color: #86868b; margin-bottom: 15px; display: block; }
        
        .actions { display: flex; gap: 10px; justify-content: center; }
        .add-btn { flex: 1; padding: 10px; background: #f5f5f7; border: none; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .order-btn { flex: 1; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; }

        /* --- CART --- */
        .cart-sidebar { position: fixed; top: 0; right: -360px; width: 340px; height: 100%; background: white; z-index: 2000; transition: 0.4s; padding: 30px; box-shadow: -5px 0 20px rgba(0,0,0,0.1); }
        .cart-sidebar.active { right: 0; }
        .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 13px; }
        .cart-item img { width: 45px; height: 45px; object-fit: contain; background: #f5f5f7; border-radius: 5px; }

        footer { padding: 50px 8%; text-align: center; border-top: 1px solid #eee; background: #f9f9f9; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">Super<span>Studio</span></div>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-bar" placeholder="Search cameras, fashion..." onkeyup="filterProducts()">
        </div>

        <div class="nav-right">
            <div class="cart-trigger" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>Experience SuperStudio.</h1>
    </header>

    <div class="container">
        <div class="grid" id="product-grid"></div>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Your Bag</h2>
            <i class="fa-solid fa-xmark" style="cursor:pointer" onclick="toggleCart()"></i>
        </div>
        <div id="cart-list" style="height: 70%; overflow-y: auto;"></div>
        <hr><br>
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <span>Total:</span><span id="total-price">₹0</span>
        </div>
        <button onclick="checkout()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; margin-top:20px; cursor:pointer; font-weight:bold;">Check Out</button>
    </div>

    <footer>
        <span style="font-weight:800; text-transform:uppercase;">SuperStudio</span>
        <p style="color:#86868b; font-size:12px; margin-top:5px;">&copy; 2026 Designed by SuperStudio. All rights reserved.</p>
    </footer>

    <script>
        const products = [
            { id: 1, name: "Sony Alpha a7R V Mirrorless", price: 345000, img: "https://images.unsplash.com/photo-1510127034890-ba27508e9f1c?w=600" },
            { id: 2, name: "Canon EOS R5 Professional", price: 310000, img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=600" },
            { id: 3, name: "Fujifilm X-T5 Silver", price: 165000, img: "https://images.unsplash.com/photo-1502920917128-1aa500764cbd?w=600" },
            { id: 4, name: "Nikon Z9 Flagship Camera", price: 475000, img: "https://images.unsplash.com/photo-1621319011735-998246766d93?w=600" },
            { id: 5, name: "Leica Q3 Luxury Compact", price: 520000, img: "https://images.unsplash.com/photo-1488330890490-c291ecf62571?w=600" },
            { id: 6, name: "DJI Mavic 3 Pro Drone", price: 195000, img: "https://images.unsplash.com/photo-1508614589041-895b88991e3e?w=600" },
            { id: 7, name: "GoPro HERO12 Black", price: 45000, img: "https://images.unsplash.com/photo-1565349195357-7416076994a0?w=600" },
            { id: 8, name: "Tech-Fiber Field Jacket", price: 8500, img: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600" },
            { id: 9, name: "Heavyweight Cotton Hoodie", price: 3400, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=600" },
            { id: 10, name: "Raw Selvedge Denim", price: 5200, img: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=600" },
            { id: 11, name: "Aviator Stealth Glasses", price: 12500, img: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=600" },
            { id: 12, name: "Leather Commuter Boots", price: 9500, img: "https://images.unsplash.com/photo-1520639889410-d65c36fcf952?w=600" },
            { id: 13, name: "Designer Leather Tote", price: 18000, img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600" },
            { id: 14, name: "Blackmagic 6K Pro", price: 240000, img: "https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=600" },
            { id: 15, name: "Instax Mini Evo Hybrid", price: 18999, img: "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=600" },
            { id: 16, name: "Urban Cargo Pants", price: 3200, img: "https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=600" },
            { id: 17, name: "Explorer Backpack", price: 7200, img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=600" },
            { id: 18, name: "Sony 24-70mm GM II", price: 198000, img: "https://images.unsplash.com/photo-1617005082133-548c4dd27f35?w=600" },
            { id: 19, name: "Vintage Biker Jacket", price: 16000, img: "https://images.unsplash.com/photo-1521223344201-d169129f7b7d?w=600" }
        ];

        const grid = document.getElementById('product-grid');
        let cart = [];

        function renderProducts(items) {
            grid.innerHTML = '';
            items.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="img-box"><img src="${p.img}"></div>
                        <h3>${p.name}</h3>
                        <p class="price">₹${p.price.toLocaleString()}</p>
                        <div class="actions">
                            <button class="add-btn" onclick="addToCart(${p.id})">Add to Bag</button>
                            <button class="order-btn" onclick="directOrder(${p.id})">Order Now</button>
                        </div>
                    </div>`;
            });
        }

        function filterProducts() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            cart.push(p);
            updateCart();
            if(!document.getElementById('cart-sidebar').classList.contains('active')) toggleCart();
        }

        function directOrder(id) {
            const p = products.find(i => i.id === id);
            alert(`✅ Order Confirmed: ${p.name}`);
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0; list.innerHTML = '';
            cart.forEach((item, idx) => {
                total += item.price;
                list.innerHTML += `<div class="cart-item"><img src="${item.img}"> <div style="flex:1"><b>${item.name}</b><br>₹${item.price.toLocaleString()}</div> <i class="fa-solid fa-trash-can" style="cursor:pointer; color:#ccc" onclick="remove(${idx})"></i></div>`;
            });
            document.getElementById('total-price').innerText = '₹' + total.toLocaleString();
        }

        function remove(idx) { cart.splice(idx, 1); updateCart(); }
        function checkout() { alert("🚀 Check-out Successful!"); cart = []; updateCart(); toggleCart(); }

        // Initial Render
        renderProducts(products);
    </script>
</body>
</html>
