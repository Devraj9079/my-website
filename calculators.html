<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Calculator</title>
    <style>
        /* CSS: Calculator ka design aur style */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa; /* Light blue background */
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .calculator {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            width: 300px;
        }
        #display {
            width: 100%;
            height: 60px;
            background-color: #ecf0f1;
            color: #2c3e50;
            text-align: right;
            font-size: 30px;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #ecf0f1;
            color: #2c3e50;
            transition: 0.2s;
            font-weight: bold;
        }
        button:hover {
            background-color: #bdc3c7;
        }
        button.operator {
            background-color: #e67e22; /* Orange for operators */
            color: white;
        }
        button.operator:hover {
            background-color: #d35400;
        }
        button.clear {
            background-color: #e74c3c; /* Red for clear */
            color: white;
            grid-column: span 4; /* Clear button occupies full width */
        }
        button.clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled placeholder="0">
    <div class="buttons">
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="operator" onclick="calculate()">=</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="clear" onclick="clearDisplay()">Clear</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    // Screen par numbers aur symbols dikhane ke liye
    function appendValue(value) {
        display.value += value;
    }

    // Screen ko saaf (clear) karne ke liye
    function clearDisplay() {
        display.value = '';
    }

    // Calculation karne ke liye
    function calculate() {
        try {
            // eval() math ke string ko calculate karta hai (jaise "2+2" ko 4 banata hai)
            display.value = eval(display.value);
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>
